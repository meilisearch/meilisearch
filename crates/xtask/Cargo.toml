[package]
name = "xtask"
version.workspace = true
authors.workspace = true
description = "Workspace automation tool following the xtask pattern <https://github.com/matklad/cargo-xtask>"
homepage.workspace = true
readme.workspace = true
edition.workspace = true
license.workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = "1.0.100"
build-info = { version = "1.7.0", path = "../build-info" }
cargo_metadata = "0.23.1"
clap = { version = "4.6.1", features = ["derive"] }
futures-util = "0.3.32"
reqwest = { version = "0.12.28", features = [
    "stream",
    "json",
    "rustls-tls",
], default-features = false }
semver = "1.0.27"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
sha2 = "0.10.9"
sysinfo = { version = "0.38.4", default-features = false, features = ["system"] }
time = { version = "0.3.47", features = [
    "serde",
    "serde-human-readable",
    "macros",
] }
tokio = { version = "1.48.0", features = [
    "rt",
    "net",
    "time",
    "process",
    "signal",
] }
tracing = "0.1.41"
tracing-subscriber = "0.3.20"
tracing-trace = { version = "0.1.0", path = "../tracing-trace" }
uuid = { version = "1.18.1", features = ["v7", "serde"] }
similar-asserts = "1.7.0"
